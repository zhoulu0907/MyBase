server:
  port: 48080

--- #################### 数据库相关配置 ####################
spring:
  datasource:
    driver-class-name: org.opengauss.Driver
    url: jdbc:opengauss://10.0.104.38:5432/onebase_cloud_v3?currentSchema=public&useUnicode=true&characterEncoding=utf-8
    username: gaussdb
    password: onebase@2025
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 1
      maximum-pool-size: 20
      connection-test-query: SELECT 1
      connection-timeout: 30000
      validation-timeout: 5000
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://10.0.104.38:6379"
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 5
          connectionMinimumIdleSize: 2
          connectionPoolSize: 5
          database: 0

--- #################### 服务保障相关配置 ####################

lock4j:
  acquire-timeout: 3000
  expire: 30000

logging:
  file:
    name: ${user.home}/logs/${spring.application.name}.log
  level:
    org.opengauss: INFO
    org.anyline.data.jdbc.opengauss: DEBUG

debug: false

--- #################### OneBase相关配置 ####################

onebase:
  captcha:
    enable: false
  security:
    mock-enable: false
  access-log:
    enable: false
  web:
    return-exception-stack-trace: true
  metadata:
    default-datasource:
      type: OpenGauss
      host: 10.0.104.38
      port: 5432
      database: onebase_business
      username: gaussdb
      password: onebase@2025
      description: OpenGauss默认数据源
  scheduler:
    address: http://10.0.104.33:12345/dolphinscheduler
    token: 85806d2d33502cef3036fb30b320e5f5
    env: 154612656767296
    flow-project: 154702155517248
    flow-url: http://bing.com
    etl-project: 155572154738048
    tenant: root

pagehelper:
  helperDialect: postgresql

anyline:
  is-debug: false
  is-log-sql: false
  is-log-sql-when-error: true
  is-log-sql-param-when-error: true
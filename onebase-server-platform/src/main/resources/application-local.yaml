server:
  port: 48080

--- #################### 数据库相关配置 ####################
spring:
  # 数据源配置项
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://10.0.104.38:5432/onebase_cloud_v3
    username: postgres
    password: onebase@2025
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 1
      maximum-pool-size: 20
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://10.0.104.38:6379"
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 5
          connectionMinimumIdleSize: 2
          connectionPoolSize: 5
          database: 0

--- #################### 服务保障相关配置 ####################

# Lock4j 配置项
lock4j:
  acquire-timeout: 3000 # 获取分布式锁超时时间，默认为 3000 毫秒
  expire: 30000 # 分布式锁的超时时间，默认为 30 毫秒

# 日志文件配置
logging:
  file:
    name: ${user.home}/logs/${spring.application.name}.log # 日志文件名，全路径

debug: false

--- #################### OneBase相关配置 ####################

# OneBase配置项，设置当前项目所有自定义的配置
onebase:
  captcha:
    enable: false # 本地环境，暂时关闭图片验证码，方便登录等接口的测试；
  platform-tenant:
    enable-create-app: true # 测试环境，暂时允许平台租户创建应用，方便登录接口测试；
  security:
    mock-enable: false
  access-log: # 访问日志的配置项
    enable: false
  web:
    return-exception-stack-trace: true # 本地开发：接口错误时返回堆栈，便于调试
  scheduler:
    address: http://10.0.104.33:12345/dolphinscheduler
    token: 85806d2d33502cef3036fb30b320e5f5
    env: 154612656767296
    flow-project: 154702155517248
    flow-url: http://bing.com
    etl-project: 155572154738048
    tenant: root

justauth:
  enabled: true
  cache:
    type: REDIS
    prefix: 'social_auth_state:' # 缓存前缀，目前只对 Redis 缓存生效，默认 JUSTAUTH::STATE::
    timeout: 24h # 超时时长，目前只对 Redis 缓存生效，默认 3 分钟

liteflow:
  enable: true
server:
  port: 48080

--- #################### 数据库相关配置 ####################
spring:
  datasource:
    driver-class-name: org.opengauss.Driver
    url: jdbc:opengauss://10.0.104.38:5432/onebase_cloud_v3?currentSchema=public&useUnicode=true&characterEncoding=utf-8
    username: gaussdb
    password: onebase@2025
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 1
      maximum-pool-size: 20
      connection-test-query: SELECT 1
      connection-timeout: 30000
      validation-timeout: 5000
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://10.0.104.38:6379"
          subscriptionConnectionMinimumIdleSize: 1
          subscriptionConnectionPoolSize: 5
          connectionMinimumIdleSize: 2
          connectionPoolSize: 5
          database: 0

--- #################### 服务保障相关配置 ####################

lock4j:
  acquire-timeout: 3000
  expire: 30000

debug: false

--- #################### OneBase相关配置 ####################

onebase:
  sign:
    request-timeout: 86400
  captcha:
    enable: false
  platform-tenant:
    enable-create-app: true
  security:
    mock-enable: true
  access-log:
    enable: false
  web:
    return-exception-stack-trace: true
  metadata:
    default-datasource:
      type: OpenGauss
      host: 10.0.104.38
      port: 5432
      database: onebase_business
      username: gaussdb
      password: onebase@2025
      description: OpenGauss默认数据源

# OneBase 后端 API Nginx 配置
# ================================
#
# 前端 nginx 引用方式:
#
# http {
#     # 引入 upstream 定义
#     include /path/to/onebase-upstream.conf;
#
#     server {
#         listen 80;
#         server_name localhost;
#
#         # 前端静态资源
#         location / {
#             root /usr/share/nginx/html;
#             index index.html;
#             try_files $uri $uri/ /index.html;
#         }
#
#         # 引入后端 API location 配置
#         include /path/to/onebase-location.conf;
#     }
# }
#
# 注意：
# 1. onebase-upstream.conf 放在 http 块中
# 2. onebase-location.conf 放在 server 块中
# 3. 根据实际部署修改 upstream 中的 server 地址
#
# 文件说明:
#   onebase-upstream.conf - upstream 定义（http 块引用）
#   onebase-location.conf - location 配置（server 块引用）
#
# 访问地址:
#   编辑态 API: /build-api/admin-api/...
#   运行态 API: /runtime-api/runtime-api/...
#   Flink API:  /flink-api/...
#
# 示例:
#   登录接口: /build-api/admin-api/system/auth/login
#   页面列表: /build-api/admin-api/app/page/list
server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: onebase-plugin-testhost
  profiles:
    active: dev

# OneBase 插件系统配置
onebase:
  plugin:
    enabled: true
    plugins-dir: ${plugin.base-dir:./plugins}
    auto-load: true
    auto-start: true

# 日志配置
logging:
  level:
    root: INFO
    com.cmsr.onebase: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

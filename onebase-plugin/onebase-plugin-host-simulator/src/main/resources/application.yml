spring:
  profiles:
    default: staging
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    root: INFO
    com.cmsr.onebase.plugin: INFO
    org.pf4j: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

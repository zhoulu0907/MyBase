# OneBase 插件配置模拟文件
# 用于插件开发阶段模拟宿主系统的配置服务
#
# 格式说明：
#   plugins:
#     <pluginId>:
#       <key>: <value>
#       ...
#
# 插件开发者可根据需要添加自己的插件配置

tenant:
  tenant-id: 1
  application-id: 100

plugins:
  # ===== 示例：Hello 插件配置 =====
  hello-plugin:
    greeting.message: "欢迎使用 OneBase 插件系统！"
    greeting.enabled: true
    max-retry: 3

  # ===== 示例：OCR 插件配置 =====
  # 展示典型的第三方服务配置场景
  ocr-plugin:
    # 服务商选择：baidu / aliyun / tencent
    provider: "baidu"
    
    # 百度 OCR 配置
    baidu.api-key: "mock-baidu-api-key"
    baidu.secret-key: "mock-baidu-secret-key"
    baidu.endpoint: "https://aip.baidubce.com/rest/2.0/ocr"
    
    # 阿里云 OCR 配置
    aliyun.access-key-id: "mock-aliyun-access-key"
    aliyun.access-key-secret: "mock-aliyun-secret"
    aliyun.region: "cn-shanghai"
    
    # 通用配置
    timeout: 30000
    max-file-size: 10485760  # 10MB

  # ===== Dev 模式插件配置（用于开发调试） =====
  dev-mode-plugin:
    # API 配置
    apiKey: "demo-api-key-123456"
    provider: "baidu"
    
    # 性能配置
    timeout: 5000
    maxRetries: 3
    
    # 功能开关
    enableLog: true
    enableCache: false
    
    # 业务配置
    maxFileSize: 10485760  # 10MB
    supportedFormats: "jpg,png,pdf"

  # ===== 添加你的插件配置 =====
  # my-plugin:
  #   key1: value1
  #   key2: value2

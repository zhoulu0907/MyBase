server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: onebase-plugin-host-simulator-dev
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    root: INFO
    com.cmsr.onebase.plugin: DEBUG
    org.pf4j: ERROR
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 插件配置（开发模式 - 直接扫描 classpath）
# 此模式下直接扫描 classpath 中的扩展点，无需打包 ZIP/JAR
onebase:
  plugin:
    enabled: true
    auto-load: true
    auto-start: true
    mode: dev              # 开发模式，只扫描 classpath 而非 plugins-dir
    scan-interval: 0       # 开发模式下禁用定时扫描（仅staging/prod模式需要）
    plugins-dir: ./plugins # 开发模式下该配置无效
  
# 说明：
# 1. mode=dev：直接扫描 classpath 中的扩展点（onebase-plugin-demo 等）
# 2. 无需打包插件为 ZIP/JAR，启动时间快（5-10秒）
# 3. 支持断点调试、热重载
# 4. 适合快速开发迭代
# 5. scan-interval=0：开发模式下无需定时扫描插件目录

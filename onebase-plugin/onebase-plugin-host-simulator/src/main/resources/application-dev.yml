# 插件配置（开发模式 - 直接扫描 classpath）
# 此模式下直接扫描 classpath 中的扩展点，无需打包 ZIP/JAR
onebase:
  plugin:
    enabled: true
    auto-load: true
    auto-start: true
    mode: dev              # 开发模式，只扫描 classpath，不扫描plugins-dir
    scan-interval: 0       # 开发模式下该配置无效（仅staging/prod模式需要）
    plugins-dir: ./plugins # 开发模式下该配置无效


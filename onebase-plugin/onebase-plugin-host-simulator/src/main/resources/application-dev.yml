# 插件配置（开发模式 - 直接扫描 classpath）
# 此模式下直接扫描 classpath 中的扩展点，无需打包 ZIP/JAR
onebase:
  plugin:
    enabled: true
    mode: dev                     # 开发模式，只扫描 classpath，不扫描plugins-dir
    plugins-dir: ./plugins        # 插件目录（开发模式下该参数无效）
    auto-load: true               # 自动加载插件
    auto-start: true              # 自动启动插件
    dev-class-paths:              # 开发模式下扩展点扫描目录（绝对路径），仅从目录扫描扩展点，不扫描jar/zip
      - D:\\cmsr\\10_cmsr\\CodingSpace\\Java\\onebase-v3-be\\onebase-plugin\\onebase-plugin-demo\\plugin-demo-hello\\target\\classes
      - D:\\cmsr\\10_cmsr\\CodingSpace\\Java\\onebase-v3-be\\onebase-plugin\\onebase-plugin-demo\\plugin-demo-test\\target\\classes

logging:
  level:
    root: INFO
    com.cmsr.onebase.plugin: DEBUG
    org.pf4j: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
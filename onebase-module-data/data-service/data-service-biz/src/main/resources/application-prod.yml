spring:
  datasource:
    url: jdbc:mysql://10.0.104.38:3306/onebase_v3_prod?autoReconnect=false&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: onebase@2025
    ### 连接池配置 - 生产环境增大连接池配置
    druid:
      initial-size: 10
      max-active: 50
      min-idle: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: true
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
  messages:
    basename: i18n/lic,i18n/core,i18n/permissions,i18n/xpack,i18n/sync
  flyway:
    enabled: true
    table: de_prod_version
    validate-on-migrate: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

# 生产环境日志配置
logging:
  level:
    root: WARN
    com.cmsr: INFO
  file:
    path: /data/backend/logs/onebase

mybatis-plus:
  mapper-locations: classpath:mybatis/*.xml
  # 生产环境关闭SQL日志
  # configuration:
  #   log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

dataease:
  path:
    ehcache: /data/backend/dataease/cache
    data: /data/backend/dataease/data
    custom-drivers: /data/backend/dataease/custom-drivers/
    driver: /data/backend/dataease/drivers
    excel: /data/backend/dataease/data/excel/
    report: /data/backend/dataease/data/report/
    static-resource: /data/backend/dataease/data/static-resource/
    font: /data/backend/dataease/data/font/
    exportData: /data/backend/dataease/data/exportData/ 
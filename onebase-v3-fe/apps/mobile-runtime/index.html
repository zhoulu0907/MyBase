    <style>
      /* 移动端基准设置 */
      html {
        -webkit-text-size-adjust: 100%;
        background-color: #f0f0f0;
      }

      body {
        color: #333;
        background: #fff;
        margin: 0 auto !important;
        overflow-x: hidden;
      }

      @media (min-width: 900px) {
        body {
          max-width: 450px;
          min-height: 100dvh;
          box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
          position: relative;
        }
      }
      #root {
        padding: 0;
        overflow: auto visible;
        min-height: 100dvh;
      }
    </style>
  </head>

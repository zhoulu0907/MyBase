# Gateway Nginx 配置（路径模式统一入口）
# 仅在 DEPLOY_MODE=path 时使用
#
# 后端 API 配置通过 include 引用 middleware 目录下的配置文件
# 请确保 middleware/ 目录下存在以下文件：
#   - onebase-upstream.conf  （后端 upstream 定义）
#   - onebase-location.conf  （后端 location 配置）
#
# middleware 目录挂载到 /etc/nginx/middleware/
# include 使用相对路径（相对于 /etc/nginx/）

# ==================== 前端服务 Upstream ====================

upstream onebase-app-builder {
    server onebase-app-builder:80;
}

upstream onebase-admin-console {
    server onebase-admin-console:80;
}

upstream onebase-runtime {
    server onebase-runtime:80;
}

upstream onebase-mobile-runtime {
    server onebase-mobile-runtime:80;
}

upstream onebase-mobile-editor {
    server onebase-mobile-editor:80;
}

# ==================== 后端 API Upstream ====================
# 通过 include 引入后端提供的配置文件
# 配置文件位置：/etc/nginx/middleware/onebase-upstream.conf

include middleware/onebase-upstream.conf;

# ==================== Server 配置 ====================

server {
    listen 80;
    server_name localhost;

    # ==================== 前端静态资源 ====================

    # App Builder
    location /appbuilder/ {
        proxy_pass http://onebase-app-builder/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin Console
    location /console/ {
        proxy_pass http://onebase-admin-console/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Runtime
    location /runtime/ {
        proxy_pass http://onebase-runtime/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Mobile Runtime
    location /mobile-runtime/ {
        proxy_pass http://onebase-mobile-runtime/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Mobile Editor
    location /mobile-editor/ {
        proxy_pass http://onebase-mobile-editor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 默认重定向到 App Builder
    location = / {
        return 301 /appbuilder/;
    }

    # ==================== 后端 API 代理 ====================
    # 通过 include 引入后端提供的配置文件
    # 配置文件位置：/etc/nginx/middleware/onebase-location.conf

    include middleware/onebase-location.conf;

    # 健康检查
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
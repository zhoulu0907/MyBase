    }

    # 根路径重定向到默认服务（可选）
    location = /onebase {
        return 301 $scheme://$http_host/onebase/admin-console/;
    }

    location = /onebase/ {
        return 301 $scheme://$http_host/onebase/admin-console/;
    }

    location = / {
        return 301 $scheme://$http_host/onebase/admin-console/;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

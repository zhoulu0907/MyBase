<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container { text-align: center; padding: 40px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e5e5;
      border-top-color: #165dff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text { color: #666; font-size: 14px; }
    .error { color: #f56c6c; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p class="text" id="status">正在处理登录...</p>
    <p class="text error" id="error" style="display:none;"></p>
  </div>
  <!-- 引入 SSO 配置文件 -->
  <script src="./sso.config.js"></script>
  <script>
    (function() {
      // 从配置文件读取配置
      var CONFIG = window.SSO_CONFIG || {
        lingjiHome: 'https://rdcloud.4c-uat.hq.cmcc/cmdevops-platform-desktop-web/home',
        ssoLoginApi: 'http://onebase.4c-uat.hq.cmcc:20011/observerbuilder/admin-api/system/lingji-sso/login',
        successRedirectBase: 'http://onebase.4c-uat.hq.cmcc:20011/appbuilder'
      };
      
      var urlParams = new URLSearchParams(window.location.search);
      var code = urlParams.get('code');
      var statusEl = document.getElementById('status');
      var errorEl = document.getElementById('error');

      if (code) {
        statusEl.textContent = '正在验证登录信息...';
        
        fetch(CONFIG.ssoLoginApi + '?code=' + encodeURIComponent(code))
          .then(function(response) { return response.json(); })
          .then(function(data) {
            if (data.code === 0 && data.data && data.data.accessToken) {
              localStorage.setItem('accessToken', data.data.accessToken);
              if (data.data.refreshToken) {
                localStorage.setItem('refreshToken', data.data.refreshToken);
              }
              // 从后端返回获取 tenantId，构建完整跳转地址
              var tenantId = data.data.tenantId || '';
              var successRedirect = CONFIG.successRedirectBase + '/#/onebase/' + tenantId + '/setting/application';
              window.location.href = successRedirect + '?token=' + encodeURIComponent(data.data.accessToken);
            } else {
              statusEl.textContent = '登录失败';
              errorEl.textContent = data.msg || '未知错误';
              errorEl.style.display = 'block';
              setTimeout(function() { window.location.href = CONFIG.lingjiHome; }, 3000);
            }
          })
          .catch(function(error) {
            statusEl.textContent = '登录请求失败';
            errorEl.textContent = error.message || '网络错误';
            errorEl.style.display = 'block';
            setTimeout(function() { window.location.href = CONFIG.lingjiHome; }, 3000);
          });
      } else {
        statusEl.textContent = '正在跳转到灵畿平台...';
        window.location.href = CONFIG.lingjiHome;
      }
    })();
  </script>
</body>
</html>

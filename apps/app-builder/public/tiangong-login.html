<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e5e5;
      border-top-color: #165dff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .text {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p class="text">正在处理登录...</p>
  </div>
  <script>
    (function() {
      debugger
      var urlParams = new URLSearchParams(window.location.search);
      var code = urlParams.get('code');
      var state = urlParams.get('state');
      var isSitHost = window.location.host === 'onebase.sit.artifex-cmcc.com.cn';
      var baseUrl = isSitHost ? '' : '/v0';

      if (code) {
        var redirectUrl = baseUrl + '/obappbuilder/#/oauth/obbuilder/app?code=' + encodeURIComponent(code);
        if (state) {
          redirectUrl += '&state=' + encodeURIComponent(state);
        }
        window.location.href = redirectUrl;
      } else {
        window.location.href = baseUrl + '/obappbuilder/#/login';
      }
    })();
  </script>
</body>
</html>

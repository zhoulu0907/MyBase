<svg width="320" height="200" viewBox="0 0 320 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" viewBox="0 0 12 12" refX="1" refY="6" markerUnits="strokeWidth"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#FFB74D"/>
    </marker>
  </defs>

  <!-- 右侧表格 -->
  <g transform="translate(80,20)">
    <rect x="0" y="0" width="200" height="24" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <line x1="0" y1="24" x2="200" y2="24" stroke="#90CAF9" stroke-width="1"/>
    <rect x="0" y="26" width="200" height="16" fill="#F5F5F5"/>
    <rect x="0" y="46" width="200" height="16" fill="#F5F5F5"/>
    <rect x="0" y="66" width="200" height="16" fill="#F5F5F5"/>
    <rect x="0" y="86" width="200" height="16" fill="#F5F5F5"/>
    <rect x="0" y="106" width="200" height="16" fill="#F5F5F5"/>
    <rect x="0" y="0" width="200" height="130" fill="none" stroke="#90CAF9" stroke-width="1"/>
  </g>

  <!-- 左侧拖入模块 -->
  <g transform="translate(10,80)">
    <rect x="0" y="-20" width="60" height="40" rx="6" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.5"/>
    <rect x="8" y="-12" width="44" height="24" rx="4" fill="#FFE0B2"/>
  </g>

  <!-- 箭头路径 -->
  <path d="M70,80 C120,60 140,140 160,140" fill="none" stroke="#FFB74D" stroke-width="2"
        marker-end="url(#arrowhead)"/>
</svg>

onebase:
  dolphinscheduler:
    client:
      enabled: true
      # DolphinScheduler 基础地址，必须以 / 结尾，例如：http://127.0.0.1:12345/dolphinscheduler/
      baseUrl: http://10.0.104.33:12345/dolphinscheduler/v2/
      # 访问认证 token（测试环境示例）
      token: 85806d2d33502cef3036fb30b320e5f5
      # 超时与日志
      connectTimeout: 5s
      readTimeout: 30s
      writeTimeout: 30s
      # 日志级别：NONE/BASIC/HEADERS/BODY
      logLevel: BASIC
      # 是否启用真实联通性测试（仅测试环境使用）：
      # true 将实际向 DolphinScheduler 发起请求，false 则跳过
      enable-live-connectivity-test: false

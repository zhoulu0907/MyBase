# FT环境 (功能测试环境) 配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://10.0.104.38:3306/dataview_ft?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: onebase@2025
    ### 连接池配置
    druid:
      initial-size: 5
      max-active: 20
      min-idle: 10
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: true
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

# FT环境特定的文件存储配置
v2:
  xnljmap:
    oss: file:/data/backend/fileserver_ft/
  fileurl: /data/backend/fileserver_ft
  httpurl: http://10.0.104.38:8083/

# FT环境日志配置
logging:
  level:
    root: INFO
    com.cmsr.v2: DEBUG
  file:
    name: /data/backend/logs/goview_ft.log
    max-size: 10MB
    max-history: 15

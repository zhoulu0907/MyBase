# 生产环境配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://10.0.104.38:3306/dataview_prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: onebase@2025
    ### 连接池配置 - 生产环境增大连接池配置
    druid:
      initial-size: 10
      max-active: 50
      min-idle: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: true
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000

# 生产环境特定的文件存储配置
v2:
  xnljmap:
    oss: file:/data/backend/fileserver/
  fileurl: /data/backend/fileserver
  httpurl: http://应用服务器IP或域名:8083/

# 生产环境日志配置
logging:
  level:
    root: WARN
    com.cmsr.v2: INFO
  file:
    name: /data/backend/logs/goview.log
    max-size: 10MB
    max-history: 30

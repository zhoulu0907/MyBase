server:
  port: 48080

--- #################### 数据库相关配置 ####################
spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://10.0.104.38:5432/onebase_cloud_v3
    username: postgres
    password: onebase@2025
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 1
      maximum-pool-size: 20

  # Redis 配置。Redisson 默认的配置足够使用，一般不需要进行调优
  data:
    redis:
      host: 10.0.104.38 # 地址
      #host: 127.0.0.1 # 地址
      port: 6379 # 端口
      database: 0 # 数据库索引
  #    password: dev # 密码，建议生产环境开启
      timeout: 30000ms # 超时时间
      connect-timeout: 30000 # 连接超时时间
      lettuce:
        pool:
          max-active: 24    # 最大连接数，与错误信息中的24保持一致
          max-idle: 24      # 最大空闲连接
          min-idle: 8       # 最小空闲连接
          max-wait: 10000ms # 最大等待时间
          time-between-eviction-runs: 30s # 空闲连接检查间隔
redisson:
  single-server-config:
    address: redis://10.0.104.38:6379
    database: 0

liteflow:
  enable: true
  print-banner: false
  rule-source: el_xml:com.cmsr.onebase.module.flow.core.flow.FlowJsonGraphParser
# ========== 流程事件服务配置示例 ==========

# 方案一：使用本地简单事件服务（默认）
onebase:
  flow:
    event:
      type: simple

# 方案二：使用Redis分布式事件服务
# onebase:
#   flow:
#     event:
#       type: redis

# 注意事项：
# 1. type=simple: 使用本地事件处理，适用于单体应用或不需要跨节点同步的场景
# 2. type=redis: 使用Redis发布订阅机制，适用于微服务架构或需要跨节点事件同步的场景
# 3. 当使用Redis事件服务时，确保Redis服务可用且配置正确
# 4. 如果不配置，默认使用simple模式
# 5. 只需要配置type属性即可，Spring Boot会根据此配置自动选择相应的实现类